<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); font-family:var(--font-sans); color:var(--fg-0); display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { background:var(--bg-1); border:1px solid var(--border); border-radius:4px; padding:20px; }
  .card:hover { border-color:var(--border-strong); }
  .eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-2); margin-bottom:12px; }
  .value { font-family:var(--font-mono); font-size:28px; font-variant-numeric:tabular-nums; letter-spacing:-0.01em; margin-bottom:4px; }
  .delta { font-family:var(--font-mono); font-size:13px; }
  .pos { color:#6AA77B; }
  .neg { color:#C26B6B; }
  .meta { font-size:12px; color:var(--fg-2); margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
</style></head>
<body>
  <div class="card">
    <div class="eyebrow">Portfolio · BTC</div>
    <div class="value">0.04823</div>
    <div class="delta pos">+0.00142 · +3.03%</div>
    <div class="meta">Since inception · synced 2m ago</div>
  </div>
  <div class="card">
    <div class="eyebrow">Open position · BTCUSDT</div>
    <div class="value">67,420.50</div>
    <div class="delta neg">-823.40 · -1.21%</div>
    <div class="meta">Liquidation distance · 12.40%</div>
  </div>
</body></html>
