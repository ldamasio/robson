<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-0); color:var(--fg-0); font-family:var(--font-sans); }
  .wrap { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .sw { border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
  .chip { height:56px; }
  .label { padding:8px 10px; display:flex; justify-content:space-between; font-size:11px; font-family:var(--font-mono); }
  .name { color:var(--fg-0); letter-spacing:0.06em; text-transform:uppercase; }
  .hex { color:var(--fg-2); }
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#08090B"></div><div class="label"><span class="name">bg-0</span><span class="hex">#08090B</span></div></div>
  <div class="sw"><div class="chip" style="background:#101215"></div><div class="label"><span class="name">bg-1</span><span class="hex">#101215</span></div></div>
  <div class="sw"><div class="chip" style="background:#16191D"></div><div class="label"><span class="name">bg-2</span><span class="hex">#16191D</span></div></div>
  <div class="sw"><div class="chip" style="background:#1C2026"></div><div class="label"><span class="name">bg-3</span><span class="hex">#1C2026</span></div></div>
  <div class="sw"><div class="chip" style="background:#24282E"></div><div class="label"><span class="name">border</span><span class="hex">#24282E</span></div></div>
</div>
</body></html>
