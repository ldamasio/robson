<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); font-family:var(--font-sans); color:var(--fg-0); }
  .row { display:flex; align-items:flex-end; gap:16px; margin-bottom:12px; }
  .bar { background:var(--accent); height:16px; }
  .lbl { font-family:var(--font-mono); font-size:11px; color:var(--fg-2); width:56px; letter-spacing:0.06em; text-transform:uppercase; }
  .val { font-family:var(--font-mono); font-size:11px; color:var(--fg-1); }
</style></head>
<body>
  <div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
  <div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
  <div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
  <div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
  <div class="row"><div class="lbl">space-5</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
  <div class="row"><div class="lbl">space-6</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
  <div class="row"><div class="lbl">space-7</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
  <div class="row"><div class="lbl">space-8</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
</body></html>
