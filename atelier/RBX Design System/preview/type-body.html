<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); color:var(--fg-0); font-family:var(--font-sans); }
  .row { display:grid; grid-template-columns:80px 1fr; align-items:baseline; gap:24px; padding:8px 0; border-bottom:1px solid var(--border); }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); }
</style></head>
<body>
  <div class="row"><div class="label">Body MD</div><div style="font-size:16px; line-height:24px;">Positions move through defined states with validated transitions.</div></div>
  <div class="row"><div class="label">Body</div><div style="font-size:14px; line-height:22px;">The execution pipeline defaults to simulation mode. Live execution requires explicit flags.</div></div>
  <div class="row"><div class="label">Caption</div><div style="font-size:13px; line-height:20px; color:#B8BCC2;">A secondary note supporting the primary text above.</div></div>
  <div class="row"><div class="label">Small</div><div style="font-size:11px; line-height:16px; color:#7A7F87;">Meta, timestamps, version tags.</div></div>
</body></html>
