<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); color:var(--fg-0); font-family:var(--font-sans); }
  .row { display:grid; grid-template-columns:90px 1fr; align-items:baseline; gap:24px; padding:10px 0; border-bottom:1px solid var(--border); font-variant-numeric: tabular-nums; }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); }
  .mono { font-family:var(--font-mono); }
  .eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#7A7F87; }
</style></head>
<body>
  <div class="row"><div class="label">Eyebrow</div><div class="eyebrow">Portfolio · BTC</div></div>
  <div class="row"><div class="label">Mono MD</div><div class="mono" style="font-size:16px;">0.04823 BTC</div></div>
  <div class="row"><div class="label">Mono</div><div class="mono" style="font-size:14px;">BTCUSDT · 67,420.50 · +1.24%</div></div>
  <div class="row"><div class="label">Mono SM</div><div class="mono" style="font-size:13px; color:#B8BCC2;">2026-04-18T09:14:22Z · plan-2847</div></div>
  <div class="row"><div class="label">Token</div><div class="mono" style="font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:#C9A96E;">LIVE · ACKNOWLEDGED</div></div>
</body></html>
