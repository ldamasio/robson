<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); font-family:var(--font-sans); color:var(--fg-0); }
  table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  th { text-align:left; font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg-2); font-weight:500; padding:8px 12px; border-bottom:1px solid var(--border); }
  th.num { text-align:right; }
  td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; }
  td.mono { font-family:var(--font-mono); text-align:right; }
  tr:hover td { background:var(--bg-1); }
  .pos { color:#6AA77B; }
  .neg { color:#C26B6B; }
  .sym { font-weight:500; }
</style></head>
<body>
<table>
  <thead><tr><th>Symbol</th><th class="num">Qty</th><th class="num">Entry</th><th class="num">Mark</th><th class="num">P&amp;L</th></tr></thead>
  <tbody>
    <tr><td class="sym">BTCUSDT</td><td class="mono">0.00482</td><td class="mono">66,820.00</td><td class="mono">67,420.50</td><td class="mono pos">+2.89</td></tr>
    <tr><td class="sym">ETHUSDT</td><td class="mono">0.12400</td><td class="mono">3,280.40</td><td class="mono">3,241.10</td><td class="mono neg">-4.87</td></tr>
    <tr><td class="sym">SOLUSDT</td><td class="mono">1.84500</td><td class="mono">148.20</td><td class="mono">152.95</td><td class="mono pos">+8.76</td></tr>
  </tbody>
</table>
</body></html>
