<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); font-family:var(--font-sans); color:var(--fg-0); display:flex; flex-direction:column; gap:14px; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border-radius:2px; border:1px solid; font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; }
  .dot { width:6px; height:6px; border-radius:50%; }
  .pos { color:#6AA77B; border-color:rgba(106,167,123,0.35); background:rgba(106,167,123,0.08); }
  .pos .dot { background:#6AA77B; }
  .neg { color:#C26B6B; border-color:rgba(194,107,107,0.35); background:rgba(194,107,107,0.08); }
  .neg .dot { background:#C26B6B; }
  .warn { color:#C9A96E; border-color:rgba(201,169,110,0.35); background:rgba(201,169,110,0.08); }
  .warn .dot { background:#C9A96E; }
  .info { color:#7891A8; border-color:rgba(120,145,168,0.35); background:rgba(120,145,168,0.08); }
  .info .dot { background:#7891A8; }
  .neutral { color:#B8BCC2; border-color:var(--border-strong); background:var(--bg-2); }
  .neutral .dot { background:#7A7F87; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--fg-2); letter-spacing:0.08em; text-transform:uppercase; width:90px; }
</style></head>
<body>
  <div class="row"><div class="lbl">Status</div>
    <span class="chip pos"><span class="dot"></span>Executed</span>
    <span class="chip warn"><span class="dot"></span>Dry-run</span>
    <span class="chip neg"><span class="dot"></span>Stop hit</span>
    <span class="chip info"><span class="dot"></span>Pending</span>
    <span class="chip neutral"><span class="dot"></span>Draft</span>
  </div>
  <div class="row"><div class="lbl">P&amp;L</div>
    <span class="chip pos">+1.24%</span>
    <span class="chip neg">-0.87%</span>
    <span class="chip neutral">0.00%</span>
  </div>
</body></html>
