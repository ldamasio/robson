<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); color:var(--fg-0); font-family:var(--font-sans); }
  .row { display:grid; grid-template-columns:80px 1fr; align-items:baseline; gap:24px; padding:8px 0; border-bottom:1px solid var(--border); }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-2); }
</style></head>
<body>
  <div class="row"><div class="label">Display</div><div style="font-size:40px; line-height:48px; font-weight:600; letter-spacing:-0.02em;">Execution &amp; risk engine</div></div>
  <div class="row"><div class="label">H1</div><div style="font-size:32px; line-height:40px; font-weight:600; letter-spacing:-0.02em;">Portfolio valuation</div></div>
  <div class="row"><div class="label">H2</div><div style="font-size:24px; line-height:32px; font-weight:600; letter-spacing:-0.02em;">Open positions</div></div>
  <div class="row"><div class="label">H3</div><div style="font-size:20px; line-height:28px; font-weight:600;">Validation result</div></div>
</body></html>
