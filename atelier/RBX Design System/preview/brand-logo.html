<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-0); font-family:var(--font-sans); color:var(--fg-0); display:flex; align-items:center; gap:48px; }
  .mark { display:flex; align-items:center; gap:10px; font-weight:600; letter-spacing:-0.02em; font-size:20px; }
  .bar { width:24px; height:2px; background:#C9A96E; }
  .wordmark { font-weight:600; letter-spacing:-0.02em; }
  .dim { color:var(--fg-2); font-weight:400; }
  .inv { background:#ECECEC; color:#08090B; padding:12px 20px; border-radius:2px; display:flex; align-items:center; gap:10px; }
  .inv .bar { background:#C9A96E; }
</style></head>
<body>
  <div class="mark"><div class="bar"></div>RBX</div>
  <div class="wordmark" style="font-size:24px;">RBX <span class="dim">Systems</span></div>
  <div class="inv"><div class="bar"></div><span style="font-weight:600;">RBX <span style="color:#7A7F87; font-weight:400;">Systems</span></span></div>
</body></html>
