<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leandro Damasio — Personal Site UI Kit</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; }
  body { background: #0A0A0B; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="WorkDetail.jsx"></script>
<script type="text/babel" src="Notes.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState('home');
  const [selectedWork, setSelectedWork] = useState(null);
  const [selectedNote, setSelectedNote] = useState(null);
  const [theme, setTheme] = useState('dark');

  const nav = (p, extra) => { setPage(p); if (extra?.work) setSelectedWork(extra.work); if (extra?.note) setSelectedNote(extra.note); window.scrollTo(0,0); };

  return (
    <div data-theme={theme === 'light' ? 'light' : undefined} style={{minHeight:'100vh', background: theme === 'light' ? '#F5F5F3' : '#0A0A0B', transition:'background 300ms'}}>
      {page === 'home'   && <HomePage   onNav={nav} theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />}
      {page === 'work'   && <WorkDetailPage work={selectedWork} onNav={nav} theme={theme} />}
      {page === 'notes'  && <NotesPage note={selectedNote} onNav={nav} theme={theme} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
