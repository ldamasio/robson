<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'GeistMono'; src:url('../fonts/GeistMonoVF.woff') format('woff'); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0A0A0B; font-family:'GeistMono',monospace; padding:20px; }
  .row { display:flex; gap:3px; align-items:flex-end; }
  .swatch { flex:1; border-radius:3px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 6px 6px; }
  .label { font-size:9px; letter-spacing:0.06em; color:rgba(245,245,243,0.5); text-transform:uppercase; line-height:1.3; }
  .hex { font-size:9px; color:rgba(245,245,243,0.35); margin-top:2px; }
  .divider { width:100%; height:1px; background:#26272C; margin:12px 0 8px; }
  .title { font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:#72747A; margin-bottom:10px; }
</style>
</head>
<body>
<div class="title">Surface Scale — Dark</div>
<div class="row">
  <div class="swatch" style="background:#050507;height:90px">
    <span class="label">Page</span>
    <span class="hex">#050507</span>
  </div>
  <div class="swatch" style="background:#0A0A0B;height:82px">
    <span class="label">Primary</span>
    <span class="hex">#0A0A0B</span>
  </div>
  <div class="swatch" style="background:#0F1012;height:75px">
    <span class="label">Raised</span>
    <span class="hex">#0F1012</span>
  </div>
  <div class="swatch" style="background:#15161A;height:68px">
    <span class="label">Card</span>
    <span class="hex">#15161A</span>
  </div>
  <div class="swatch" style="background:#1D1D22;height:60px">
    <span class="label">Footer</span>
    <span class="hex">#1D1D22</span>
  </div>
  <div class="swatch" style="background:#26272C;height:52px">
    <span class="label">Hairline</span>
    <span class="hex">#26272C</span>
  </div>
  <div class="swatch" style="background:#33343A;height:44px">
    <span class="label">Divider</span>
    <span class="hex">#33343A</span>
  </div>
</div>
<div class="divider"></div>
<div class="title">Surface Scale — Light</div>
<div class="row">
  <div class="swatch" style="background:#FAFAFA;height:52px;border:1px solid #C8C8C4">
    <span class="label" style="color:rgba(10,10,11,0.4)">Page</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#FAFAFA</span>
  </div>
  <div class="swatch" style="background:#F5F5F3;height:48px;border:1px solid #C8C8C4">
    <span class="label" style="color:rgba(10,10,11,0.4)">Primary</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#F5F5F3</span>
  </div>
  <div class="swatch" style="background:#EDEDED;height:44px;border:1px solid #C8C8C4">
    <span class="label" style="color:rgba(10,10,11,0.4)">Raised</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#EDEDED</span>
  </div>
  <div class="swatch" style="background:#E8E8E6;height:40px;border:1px solid #C8C8C4">
    <span class="label" style="color:rgba(10,10,11,0.4)">Card</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#E8E8E6</span>
  </div>
  <div class="swatch" style="background:#DDDDD9;height:36px;border:1px solid #C8C8C4">
    <span class="label" style="color:rgba(10,10,11,0.4)">Footer</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#DDDDD9</span>
  </div>
  <div class="swatch" style="background:#C8C8C4;height:32px">
    <span class="label" style="color:rgba(10,10,11,0.4)">Hairline</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#C8C8C4</span>
  </div>
  <div class="swatch" style="background:#B0B0AA;height:28px">
    <span class="label" style="color:rgba(10,10,11,0.4)">Divider</span>
    <span class="hex" style="color:rgba(10,10,11,0.3)">#B0B0AA</span>
  </div>
</div>
</body>
</html>
