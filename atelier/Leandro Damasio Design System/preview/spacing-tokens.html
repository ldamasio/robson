<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'GeistMono'; src:url('../fonts/GeistMonoVF.woff') format('woff'); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0A0A0B; font-family:'GeistMono',monospace; padding:20px; }
  .title { font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:#72747A; margin-bottom:12px; }
  .row { display:flex; align-items:flex-end; gap:4px; }
  .block { background:#15161A; border:1px solid #26272C; border-radius:2px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px; }
  .lbl { font-size:7px; letter-spacing:0.04em; color:#45474D; white-space:nowrap; }
  .val { font-size:7px; color:#72747A; margin-top:2px; }
  .divider { width:100%;height:1px;background:#26272C;margin:12px 0; }
</style>
</head>
<body>
<div class="title">Spacing Scale — Base 4px</div>
<div class="row">
  <div class="block" style="width:4px;height:20px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">1</span></div>
  <div class="block" style="width:8px;height:28px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">2</span></div>
  <div class="block" style="width:12px;height:36px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">3</span></div>
  <div class="block" style="width:16px;height:44px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">4</span></div>
  <div class="block" style="width:20px;height:52px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">5</span></div>
  <div class="block" style="width:24px;height:60px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">6</span></div>
  <div class="block" style="width:32px;height:68px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">8</span></div>
  <div class="block" style="width:40px;height:76px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">10</span></div>
  <div class="block" style="width:48px;height:84px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">12</span></div>
  <div class="block" style="width:64px;height:92px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">16</span></div>
  <div class="block" style="width:80px;height:100px"><span class="lbl" style="writing-mode:vertical-rl;transform:rotate(180deg)">20</span></div>
</div>
<div style="display:flex;gap:4px;margin-top:3px">
  <div style="width:4px;font-size:7px;color:#33343A;text-align:center">4</div>
  <div style="width:8px;font-size:7px;color:#33343A;text-align:center">8</div>
  <div style="width:12px;font-size:7px;color:#33343A;text-align:center">12</div>
  <div style="width:16px;font-size:7px;color:#33343A;text-align:center">16</div>
  <div style="width:20px;font-size:7px;color:#33343A;text-align:center">20</div>
  <div style="width:24px;font-size:7px;color:#33343A;text-align:center">24</div>
  <div style="width:32px;font-size:7px;color:#33343A;text-align:center">32</div>
  <div style="width:40px;font-size:7px;color:#33343A;text-align:center">40</div>
  <div style="width:48px;font-size:7px;color:#33343A;text-align:center">48</div>
  <div style="width:64px;font-size:7px;color:#33343A;text-align:center">64</div>
  <div style="width:80px;font-size:7px;color:#33343A;text-align:center">80</div>
</div>
<div class="divider"></div>
<div style="font-size:8px;color:#45474D">Section gap: 64–128px &nbsp;·&nbsp; Component interior: 4–16px &nbsp;·&nbsp; Hairlines: 1px</div>
</body>
</html>
