<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Geist'; src:url('../fonts/GeistVF.woff') format('woff'); font-weight:100 900; }
  @font-face { font-family:'GeistMono'; src:url('../fonts/GeistMonoVF.woff') format('woff'); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0A0A0B; font-family:'Geist',sans-serif; padding:20px; }
  .title { font-family:'GeistMono',monospace; font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:#72747A; margin-bottom:12px; }
  .row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
  .swatch { width:40px; height:40px; border-radius:4px; flex-shrink:0; }
  .swatch-sm { width:28px; height:28px; border-radius:999px; flex-shrink:0; }
  .info { display:flex; flex-direction:column; gap:2px; }
  .name { font-size:11px; font-weight:500; color:#F5F5F3; }
  .meta { font-family:'GeistMono',monospace; font-size:9px; color:#45474D; }
  .divider { width:100%; height:1px; background:#26272C; margin:12px 0; }
  .note { font-size:9px; color:#72747A; font-style:italic; margin-top:2px; }
</style>
</head>
<body>
<div class="title">Accent Colors</div>

<div class="row">
  <div class="swatch" style="background:#D9CBA3"></div>
  <div class="info">
    <span class="name">Brass / Bone — Institutional</span>
    <span class="meta">#D9CBA3</span>
    <span class="note">RBX-inherited. One per surface. Emphasis only.</span>
  </div>
</div>
<div class="row">
  <div class="swatch" style="background:#5C7080"></div>
  <div class="info">
    <span class="name">Steel Blue — Personal / Authorial</span>
    <span class="meta">#5C7080</span>
    <span class="note">New. Signals individual authorship vs. corporate brass.</span>
  </div>
</div>

<div class="divider"></div>
<div class="title">Semantic</div>

<div style="display:flex; gap:8px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div class="swatch-sm" style="background:#7FB77E"></div>
    <span style="font-family:'GeistMono',monospace;font-size:8px;color:#7FB77E">OK</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div class="swatch-sm" style="background:#D9B55A"></div>
    <span style="font-family:'GeistMono',monospace;font-size:8px;color:#D9B55A">WARN</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div class="swatch-sm" style="background:#C56A6A"></div>
    <span style="font-family:'GeistMono',monospace;font-size:8px;color:#C56A6A">ERR</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div class="swatch-sm" style="background:#7A93B0"></div>
    <span style="font-family:'GeistMono',monospace;font-size:8px;color:#7A93B0">INFO</span>
  </div>
</div>
<div style="margin-top:8px; font-family:'GeistMono',monospace; font-size:8px; color:#45474D">
  #7FB77E · #D9B55A · #C56A6A · #7A93B0
</div>
</body>
</html>
