<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @font-face { font-family:'Geist'; src:url('../fonts/GeistVF.woff') format('woff'); font-weight:100 900; }
  @font-face { font-family:'GeistMono'; src:url('../fonts/GeistMonoVF.woff') format('woff'); font-weight:100 900; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0A0A0B; font-family:'Geist',sans-serif; padding:20px; }
  .title { font-family:'GeistMono',monospace; font-size:8px; letter-spacing:0.14em; text-transform:uppercase; color:#72747A; margin-bottom:12px; }

  .card {
    background:#15161A;
    border:1px solid #26272C;
    border-radius:8px;
    padding:16px;
    max-width:320px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.04), 0 1px 3px rgba(0,0,0,0.5);
  }
  .card-eyebrow { font-family:'GeistMono',monospace; font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:#72747A; margin-bottom:6px; }
  .card-title { font-size:15px; font-weight:400; color:#F5F5F3; margin-bottom:4px; }
  .card-meta { font-family:'GeistMono',monospace; font-size:10px; color:#72747A; margin-bottom:8px; }
  .card-desc { font-size:12px; color:#B4B5B8; line-height:1.5; margin-bottom:10px; }
  .card-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid #26272C; padding-top:8px; }
  .pill { font-family:'GeistMono',monospace; font-size:8px; letter-spacing:0.04em; text-transform:uppercase; padding:3px 8px; border-radius:999px; border:1px solid; }
  .stack { font-family:'GeistMono',monospace; font-size:9px; color:#45474D; }
</style>
</head>
<body>
<div class="title">Work Card</div>
<div class="card">
  <div class="card-eyebrow">RBX Systems · Founder</div>
  <div class="card-title">Strategos</div>
  <div class="card-meta">2022–2026 &nbsp;·&nbsp; Strategic decision platform</div>
  <div class="card-desc">Situation room interface for human-AI deliberation, scenario modeling, and governed decision review in high-stakes environments.</div>
  <div class="card-footer">
    <span class="stack">Go · Svelte · PostgreSQL · MongoDB</span>
    <span class="pill" style="color:#7A93B0;border-color:#7A93B0;background:rgba(122,147,176,0.08)">● Active</span>
  </div>
</div>
</body>
</html>
