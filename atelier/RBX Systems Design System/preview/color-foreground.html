<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="eyebrow">Foreground · off-whites</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
        
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="height:48px;background:#F5F5F3;border-radius:2px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px">
              <span style="color:#F5F5F3">fg</span>
              <span>#F5F5F3</span>
              <span style="color:var(--rbx-fg-faint)">primary</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="height:48px;background:#B4B5B8;border-radius:2px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px">
              <span style="color:#B4B5B8">fg-muted</span>
              <span>#B4B5B8</span>
              <span style="color:var(--rbx-fg-faint)">body</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="height:48px;background:#72747A;border-radius:2px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px">
              <span style="color:#72747A">fg-dim</span>
              <span>#72747A</span>
              <span style="color:var(--rbx-fg-faint)">caption</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="height:48px;background:#45474D;border-radius:2px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px">
              <span style="color:#45474D">fg-faint</span>
              <span>#45474D</span>
              <span style="color:var(--rbx-fg-faint)">disabled</span>
            </div>
          </div>
      </div>
    </div></div></body></html>
