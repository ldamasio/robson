<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="eyebrow">Inputs</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label class="mono" style="font-size:10px;color:var(--rbx-fg-dim);text-transform:uppercase;letter-spacing:0.14em">Email</label>
          <input value="ops@rbx.ia.br" style="background:var(--rbx-surface-1);border:1px solid var(--rbx-line);color:var(--rbx-fg);padding:10px 12px;font:400 13px var(--rbx-font-sans);border-radius:4px">
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label class="mono" style="font-size:10px;color:var(--rbx-fg-dim);text-transform:uppercase;letter-spacing:0.14em">Instance</label>
          <select style="background:var(--rbx-surface-1);border:1px solid var(--rbx-line);color:var(--rbx-fg);padding:10px 12px;font:400 13px var(--rbx-font-sans);border-radius:4px">
            <option>truthmetal.prod.eu</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;grid-column:span 2">
          <label class="mono" style="font-size:10px;color:var(--rbx-fg-dim);text-transform:uppercase;letter-spacing:0.14em">Note</label>
          <textarea style="background:var(--rbx-surface-1);border:1px solid var(--rbx-line);color:var(--rbx-fg);padding:10px 12px;font:400 13px var(--rbx-font-sans);border-radius:4px;height:56px;resize:none">Parameter submitted for validation.</textarea>
        </div>
      </div>
    </div></div></body></html>
