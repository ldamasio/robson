<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="eyebrow">Radii · restrained</div>
      <div style="display:flex;gap:18px;align-items:flex-end">
        
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
            <div style="width:72px;height:72px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:0px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">none · 0px</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
            <div style="width:72px;height:72px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:2px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">sm · 2px</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
            <div style="width:72px;height:72px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:4px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">md · 4px</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
            <div style="width:72px;height:72px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:8px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">lg · 8px</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
            <div style="width:72px;height:72px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:12px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">xl · 12px</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:center">
            <div style="width:72px;height:72px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:999px"></div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">pill · ∞</div>
          </div>
      </div>
    </div></div></body></html>
