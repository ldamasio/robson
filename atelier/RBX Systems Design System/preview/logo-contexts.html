<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="eyebrow">Logo · contexts</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="background:#0A0A0B;padding:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--rbx-line);border-radius:4px;height:100px"><img src="../assets/bitmap.svg" style="width:48px;height:48px"></div>
        <div style="background:#1D1D22;padding:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--rbx-line);border-radius:4px;height:100px"><img src="../assets/bitmap.svg" style="width:48px;height:48px"></div>
        <div style="background:#F5F5F3;padding:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;height:100px"><img src="../assets/bitmap.svg" style="width:48px;height:48px"></div>
      </div>
      <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim);display:flex;justify-content:space-between">
        <span>ink · primary</span><span>surface-3 · footer</span><span>light · inverse</span>
      </div>
    </div></div></body></html>
