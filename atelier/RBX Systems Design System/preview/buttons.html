<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="eyebrow">Buttons</div>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
        <button style="background:var(--rbx-fg);color:var(--rbx-ink);border:0;padding:10px 18px;font:500 13px var(--rbx-font-sans);border-radius:6px;cursor:pointer">Request a proposal</button>
        <button style="background:transparent;color:var(--rbx-fg);border:1px solid var(--rbx-line-strong);padding:10px 18px;font:500 13px var(--rbx-font-sans);border-radius:6px;cursor:pointer">Schedule a call</button>
        <button style="background:transparent;color:var(--rbx-fg-muted);border:0;padding:10px 8px;font:500 13px var(--rbx-font-sans);cursor:pointer">Learn more</button>
        <button style="background:transparent;color:var(--rbx-fg-faint);border:1px solid var(--rbx-line);padding:10px 18px;font:500 13px var(--rbx-font-sans);border-radius:6px;cursor:not-allowed;opacity:0.5">Disabled</button>
      </div>
      <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">primary · outline · ghost · disabled</div>
    </div></div></body></html>
