<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="eyebrow">Elevation · hairlines &amp; shadows</div>
      <div style="display:flex;gap:16px;padding:24px 0">
        <div style="flex:1;height:100px;background:var(--rbx-surface-2);border:1px solid var(--rbx-line);border-radius:4px;display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">ring</span></div>
        <div style="flex:1;height:100px;background:var(--rbx-surface-2);border-radius:4px;box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">shadow-sm</span></div>
        <div style="flex:1;height:100px;background:var(--rbx-surface-2);border-radius:4px;box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px -8px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">shadow-md</span></div>
        <div style="flex:1;height:100px;background:var(--rbx-surface-2);border-radius:4px;box-shadow:0 1px 0 rgba(255,255,255,0.05) inset, 0 24px 48px -16px rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">shadow-lg</span></div>
      </div>
    </div></div></body></html>
