<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="eyebrow">Eyebrows · labels · numerics</div>
      <div style="display:flex;gap:48px;align-items:baseline;flex-wrap:wrap">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500">POSITIONING</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500">WHAT WE DO</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500">CAPABILITIES</div>
      </div>
      <div style="display:flex;gap:32px;align-items:baseline">
        <div class="mono" style="font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-ok);font-weight:500">● CANONICAL</div>
        <div class="mono" style="font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-warn);font-weight:500">● VALIDATING</div>
        <div class="mono" style="font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-err);font-weight:500">● REJECTED</div>
      </div>
    </div></div></body></html>
