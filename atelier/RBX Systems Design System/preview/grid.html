<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="eyebrow">Layout · container &amp; gutters</div>
      <div style="position:relative;height:110px;border:1px solid var(--rbx-line);border-radius:4px;overflow:hidden;background:var(--rbx-surface-1)">
        <div style="position:absolute;inset:0;display:grid;grid-template-columns:repeat(12,1fr);gap:12px;padding:0 24px">
          <div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div><div style="background:rgba(217,203,163,0.08);border-left:1px solid rgba(217,203,163,0.2);border-right:1px solid rgba(217,203,163,0.2)"></div>
        </div>
        <div style="position:absolute;left:24px;top:12px" class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">12-col · 12px gutter · 24px edge</div>
      </div>
      <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim)">content-w 1152 · prose-w 672</div>
    </div></div></body></html>
