<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="eyebrow">Card · product</div>
      <div style="border:1px solid var(--rbx-line);background:var(--rbx-surface-1);border-radius:8px;padding:20px 22px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div>
            <div style="font-size:16px;font-weight:500;letter-spacing:-0.01em;color:var(--rbx-fg)">Robson</div>
            <div class="mono" style="font-size:10px;color:var(--rbx-fg-dim);letter-spacing:0.04em;text-transform:uppercase;margin-top:4px">FULLSTACK · v2.3</div>
          </div>
          <span class="mono" style="padding:3px 8px;border:1px solid var(--rbx-accent-dim);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-accent)">Institutionalized</span>
        </div>
        <p style="margin:12px 0 0;font-size:13px;line-height:1.55;color:var(--rbx-fg-muted);max-width:50ch">
          Directional intelligence engine for algorithmic trading. Real-time market analysis, automated risk management, and strategy execution.
        </p>
      </div>
    </div></div></body></html>
