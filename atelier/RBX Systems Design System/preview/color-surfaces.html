<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="eyebrow">Surfaces · dark scale</div>
      <div class="swatch-row">
        <div class="swatch" style="background:#050507;border-right:1px solid rgba(255,255,255,0.04)"></div><div class="swatch" style="background:#0A0A0B;border-right:1px solid rgba(255,255,255,0.04)"></div><div class="swatch" style="background:#0F1012;border-right:1px solid rgba(255,255,255,0.04)"></div><div class="swatch" style="background:#15161A;border-right:1px solid rgba(255,255,255,0.04)"></div><div class="swatch" style="background:#1D1D22;border-right:1px solid rgba(255,255,255,0.04)"></div><div class="swatch" style="background:#26272C;border-right:1px solid rgba(255,255,255,0.04)"></div><div class="swatch" style="background:#33343A;border-right:1px solid rgba(255,255,255,0.04)"></div>
      </div>
      <div style="display:flex;gap:0">
        <div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">black</span><span>#050507</span></div><div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">ink</span><span>#0A0A0B</span></div><div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">surf-1</span><span>#0F1012</span></div><div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">surf-2</span><span>#15161A</span></div><div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">surf-3</span><span>#1D1D22</span></div><div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">line</span><span>#26272C</span></div><div style="flex:1;font-family:var(--rbx-font-mono);font-size:10px;color:var(--rbx-fg-dim);display:flex;flex-direction:column;gap:2px;padding-top:8px"><span style="color:var(--rbx-fg-muted)">line+</span><span>#33343A</span></div>
      </div>
    </div></div></body></html>
