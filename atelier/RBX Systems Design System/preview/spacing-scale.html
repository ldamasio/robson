<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="eyebrow">Spacing scale · 4px base</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-1</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">4</div>
            <div style="height:6px;width:6px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-2</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">8</div>
            <div style="height:6px;width:12px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-3</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">12</div>
            <div style="height:6px;width:18px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-4</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">16</div>
            <div style="height:6px;width:24px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-5</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">24</div>
            <div style="height:6px;width:36px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-6</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">32</div>
            <div style="height:6px;width:48px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-7</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">48</div>
            <div style="height:6px;width:72px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-8</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">64</div>
            <div style="height:6px;width:96px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
          <div style="display:flex;align-items:center;gap:16px">
            <div class="mono" style="width:64px;font-size:11px;color:var(--rbx-fg-dim)">s-9</div>
            <div class="mono" style="width:40px;font-size:11px;color:var(--rbx-fg-muted);text-align:right">96</div>
            <div style="height:6px;width:144px;background:var(--rbx-accent);opacity:0.85"></div>
          </div>
      </div>
    </div></div></body></html>
