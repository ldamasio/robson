<!doctype html><html><head><meta charset="utf-8"><title>RBX Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--rbx-ink);color:var(--rbx-fg);font-family:var(--rbx-font-sans);}
  .card{box-sizing:border-box;width:700px;padding:28px 32px;background:var(--rbx-ink);color:var(--rbx-fg);}
  .row{display:flex;align-items:baseline;gap:16px;}
  .swatch-row{display:flex;gap:0;}
  .swatch{flex:1;height:56px;position:relative;}
  .swatch-label{font-family:var(--rbx-font-mono);font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg-dim);margin-top:8px;display:flex;justify-content:space-between;}
  .hair{border-top:1px solid var(--rbx-line);}
  .mono{font-family:var(--rbx-font-mono);}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--rbx-fg-dim);font-weight:500;}
  .dim{color:var(--rbx-fg-dim);}
  .muted{color:var(--rbx-fg-muted);}
</style></head><body><div class="card rbx">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="eyebrow">Status &amp; phase badges</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        
          <span class="mono" style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--rbx-line);border-radius:999px;font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg);background:var(--rbx-surface-1)">
            <span style="width:6px;height:6px;background:#7FB77E;border-radius:50%"></span>CANONICAL
          </span>
          <span class="mono" style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--rbx-line);border-radius:999px;font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg);background:var(--rbx-surface-1)">
            <span style="width:6px;height:6px;background:#D9B55A;border-radius:50%"></span>VALIDATING
          </span>
          <span class="mono" style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--rbx-line);border-radius:999px;font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg);background:var(--rbx-surface-1)">
            <span style="width:6px;height:6px;background:#7A93B0;border-radius:50%"></span>CONSENSUS_PENDING
          </span>
          <span class="mono" style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--rbx-line);border-radius:999px;font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg);background:var(--rbx-surface-1)">
            <span style="width:6px;height:6px;background:#C56A6A;border-radius:50%"></span>REJECTED
          </span>
          <span class="mono" style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--rbx-line);border-radius:999px;font-size:10px;letter-spacing:0.04em;color:var(--rbx-fg);background:var(--rbx-surface-1)">
            <span style="width:6px;height:6px;background:#B4B5B8;border-radius:50%"></span>SUBMITTED
          </span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        
          <span class="mono" style="padding:3px 8px;border:1px solid var(--rbx-line);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-fg-muted);border-color:var(--rbx-line)">Seed</span>
          <span class="mono" style="padding:3px 8px;border:1px solid var(--rbx-line);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-fg-muted);border-color:var(--rbx-line)">Structuring</span>
          <span class="mono" style="padding:3px 8px;border:1px solid var(--rbx-line);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-fg-muted);border-color:var(--rbx-line)">Expansion</span>
          <span class="mono" style="padding:3px 8px;border:1px solid var(--rbx-line);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:var(--rbx-accent);border-color:var(--rbx-accent-dim)">Institutionalized</span>
      </div>
    </div></div></body></html>
