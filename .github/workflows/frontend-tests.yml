name: Frontend Tests

on:
  push:
    branches: ["**"]
    paths:
      - "apps/frontend-v2/**"
      - ".github/workflows/frontend-tests.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "apps/frontend-v2/**"
      - ".github/workflows/frontend-tests.yml"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: apps/frontend-v2
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: apps/frontend-v2
        run: pnpm run check

      - name: Unit tests
        working-directory: apps/frontend-v2
        run: pnpm run test

      - name: Build
        working-directory: apps/frontend-v2
        run: pnpm run build
