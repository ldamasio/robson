name: Engineering Guardrails

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks

      # Scans the working tree (--no-git), not git history: the history
      # carries known pre-guardrails findings (2026-07-05 audit); their
      # remediation is tracked separately. This gate stops NEW secrets.
      - name: Run gitleaks
        run: ./gitleaks detect --source . --no-git --no-banner --redact

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          url="https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64"
          for attempt in 1 2 3; do
            if curl -sSfL --retry 3 --retry-delay 5 --retry-all-errors -o osv-scanner "$url"; then
              chmod +x osv-scanner
              exit 0
            fi
            sleep $((attempt * 10))
          done
          exit 1

      - name: Run osv-scanner
        run: ./osv-scanner scan source --lockfile Cargo.lock

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit
